<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <style>
      :root {
        --bg: radial-gradient(circle at top, #0b1b2b 0%, #050912 100%);
        --card: rgba(255, 255, 255, 0.12);
        --card-strong: rgba(255, 255, 255, 0.18);
        --accent: #5be5ff;
        --accent2: #ff5bae;
        --text: #ffffff;
        --muted: rgba(255, 255, 255, 0.7);
        --shadow: 0 20px 55px rgba(0, 0, 0, 0.55);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: var(--text);
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        overflow-x: hidden;
      }

      .game-card {
        width: min(560px, 100%);
        border-radius: 22px;
        padding: 2.25rem 1.75rem;
        background: linear-gradient(
          120deg,
          rgba(255, 255, 255, 0.12),
          rgba(255, 255, 255, 0.05)
        );
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        position: relative;
        overflow: hidden;
      }

      .game-card::before {
        content: "";
        position: absolute;
        inset: -30%;
        background:
          radial-gradient(
            circle at 15% 25%,
            rgba(91, 229, 255, 0.45),
            transparent 45%
          ),
          radial-gradient(
            circle at 85% 35%,
            rgba(255, 91, 174, 0.42),
            transparent 50%
          );
        filter: blur(28px);
        transform: translateZ(0);
        opacity: 0.9;
      }

      .game-inner {
        position: relative;
        z-index: 1;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
        letter-spacing: -0.02em;
        text-align: center;
      }

      p.subtitle {
        margin: 0 0 2rem;
        color: var(--muted);
        text-align: center;
        font-size: 1.05rem;
      }

      .scoreboard {
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin-bottom: 1.75rem;
        flex-wrap: wrap;
      }

      .score {
        min-width: 140px;
        border-radius: 14px;
        padding: 0.85rem 1.1rem;
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.22);
        box-shadow: 0 18px 35px rgba(0, 0, 0, 0.25);
        text-align: center;
      }

      .score strong {
        display: block;
        font-size: 1.8rem;
        letter-spacing: -0.02em;
      }

      .score span {
        display: block;
        color: var(--muted);
        margin-top: 0.25rem;
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .choices {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .choice {
        aspect-ratio: 1/1;
        border-radius: 22px;
        border: 2px solid rgba(255, 255, 255, 0.17);
        background: rgba(0, 0, 0, 0.16);
        position: relative;
        cursor: pointer;
        overflow: hidden;
        transition:
          transform 0.2s ease,
          border-color 0.2s ease,
          box-shadow 0.2s ease;
        display: grid;
        place-items: center;
      }

      .choice:hover {
        transform: translateY(-4px);
        border-color: rgba(255, 255, 255, 0.42);
        box-shadow: 0 18px 35px rgba(0, 0, 0, 0.3);
      }

      .choice:active {
        transform: translateY(-1px) scale(0.98);
        box-shadow: 0 12px 22px rgba(0, 0, 0, 0.26);
      }

      .choice svg {
        width: 65%;
        height: 65%;
        transition: transform 0.25s ease;
      }

      .choice[data-choice="rock"] {
        background:
          radial-gradient(
            circle at 20% 20%,
            rgba(255, 255, 255, 0.24),
            transparent 55%
          ),
          linear-gradient(
            150deg,
            rgba(207, 189, 255, 0.26),
            rgba(88, 101, 255, 0.16)
          );
      }

      .choice[data-choice="paper"] {
        background:
          radial-gradient(
            circle at 20% 20%,
            rgba(255, 255, 255, 0.22),
            transparent 55%
          ),
          linear-gradient(
            150deg,
            rgba(64, 222, 255, 0.18),
            rgba(103, 255, 239, 0.12)
          );
      }

      .choice[data-choice="scissors"] {
        background:
          radial-gradient(
            circle at 20% 20%,
            rgba(255, 255, 255, 0.27),
            transparent 55%
          ),
          linear-gradient(
            150deg,
            rgba(255, 108, 128, 0.18),
            rgba(255, 205, 119, 0.12)
          );
      }

      .choice.selected {
        border-color: rgba(255, 255, 255, 0.6);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }

      .choice.selected svg {
        transform: scale(1.15);
      }

      .choice.winner::after {
        content: "WIN";
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        font-weight: 900;
        letter-spacing: 0.18em;
        color: rgba(255, 255, 255, 0.9);
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.75);
        background: radial-gradient(
          circle at 50% 35%,
          rgba(255, 214, 187, 0.35),
          transparent 60%
        );
        opacity: 0;
        animation: popIn 0.65s ease forwards;
      }

      @keyframes popIn {
        0% {
          opacity: 0;
          transform: scale(0.75);
        }
        80% {
          opacity: 1;
          transform: scale(1.05);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }

      .result {
        text-align: center;
        padding: 1.25rem 1rem;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 18px 35px rgba(0, 0, 0, 0.26);
      }

      .result h2 {
        margin: 0;
        font-size: 1.5rem;
        letter-spacing: -0.01em;
      }

      .result .details {
        margin-top: 0.45rem;
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.94rem;
        line-height: 1.35;
      }

      .result .details mark {
        padding: 0.15rem 0.35rem;
        background: rgba(91, 229, 255, 0.2);
        border-radius: 0.35rem;
        color: #effcff;
      }

      .controls {
        margin-top: 1.35rem;
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 0.75rem 1.1rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          box-shadow 0.2s ease;
        background: rgba(255, 255, 255, 0.12);
        color: var(--text);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.34);
      }

      button:active {
        transform: translateY(0);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.24);
      }

      button.primary {
        background: linear-gradient(110deg, var(--accent), var(--accent2));
        border: 1px solid rgba(255, 255, 255, 0.28);
      }

      @media (max-width: 460px) {
        .choices {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .scoreboard {
          justify-content: stretch;
        }
      }

      .sparkle {
        position: absolute;
        width: 120px;
        height: 120px;
        pointer-events: none;
        background:
          radial-gradient(
            circle at 20% 20%,
            rgba(255, 236, 143, 0.9),
            transparent 65%
          ),
          radial-gradient(
            circle at 80% 30%,
            rgba(140, 233, 255, 0.78),
            transparent 60%
          );
        border-radius: 50%;
        transform: scale(0);
        opacity: 0;
      }

      .sparkle.animate {
        animation: sparkle 0.8s ease-out forwards;
      }

      @keyframes sparkle {
        0% {
          opacity: 1;
          transform: scale(0.25) translate(-50%, -50%);
        }
        60% {
          opacity: 0.9;
          transform: scale(1.2) translate(-50%, -50%);
        }
        100% {
          opacity: 0;
          transform: scale(1.8) translate(-50%, -50%);
        }
      }
    </style>
  </head>
  <body>
    <div class="game-card">
      <div class="game-inner">
        <h1>Rock • Paper • Scissors</h1>
        <p class="subtitle">
          Choose your move and battle the computer. First to 5 wins!
        </p>

        <div class="scoreboard" aria-live="polite">
          <div class="score" id="playerScore">
            <strong>0</strong>
            <span>You</span>
          </div>
          <div class="score" id="tieScore">
            <strong>0</strong>
            <span>Ties</span>
          </div>
          <div class="score" id="computerScore">
            <strong>0</strong>
            <span>Computer</span>
          </div>
        </div>

        <div class="choices" role="group" aria-label="Choose your move">
          <button
            class="choice"
            type="button"
            data-choice="rock"
            aria-label="Rock"
          >
            <svg
              viewBox="0 0 24 24"
              aria-hidden="true"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M5 12l2-1 1-3 3-2 4 1 1 3 2 2 1 4-1 3-3 1-4-1-2-2-1-3z"
              />
              <path
                d="M6 13.5v1.25a1.75 1.75 0 0 0 1.75 1.75h0a1.75 1.75 0 0 0 1.75-1.75V13"
              />
            </svg>
          </button>
          <button
            class="choice"
            type="button"
            data-choice="paper"
            aria-label="Paper"
          >
            <svg
              viewBox="0 0 24 24"
              aria-hidden="true"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M7 3h10a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H9l-4-4V5a2 2 0 0 1 2-2z"
              />
              <path d="M7 3v6h10" />
            </svg>
          </button>
          <button
            class="choice"
            type="button"
            data-choice="scissors"
            aria-label="Scissors"
          >
            <svg
              viewBox="0 0 24 24"
              aria-hidden="true"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="6" cy="18" r="3" />
              <circle cx="18" cy="6" r="3" />
              <path d="M7.5 7.5l9 9" />
              <path d="M9 9l5.5-2.5" />
              <path d="M14.5 15.5L9 18" />
            </svg>
          </button>
        </div>

        <div class="result" id="result" aria-live="polite">
          <h2 id="resultTitle">Make your move</h2>
          <p class="details" id="resultDetails">
            Pick rock, paper, or scissors to start the battle.
          </p>
        </div>

        <div class="controls">
          <button class="primary" id="resetBtn" type="button">
            Reset Game
          </button>
          <button type="button" id="rulesBtn">How to Play</button>
        </div>
      </div>
      <div class="sparkle" id="sparkle"></div>
    </div>

    <script>
      const choices = ["rock", "paper", "scissors"];
      const winMap = { rock: "scissors", paper: "rock", scissors: "paper" };

      const playerScoreEl = document.querySelector("#playerScore strong");
      const computerScoreEl = document.querySelector("#computerScore strong");
      const tieScoreEl = document.querySelector("#tieScore strong");
      const resultTitle = document.querySelector("#resultTitle");
      const resultDetails = document.querySelector("#resultDetails");
      const choiceButtons = Array.from(document.querySelectorAll(".choice"));
      const resetBtn = document.querySelector("#resetBtn");
      const rulesBtn = document.querySelector("#rulesBtn");
      const sparkleEl = document.querySelector("#sparkle");

      let playerScore = 0;
      let computerScore = 0;
      let tieScore = 0;
      let isAnimating = false;

      function formatChoice(choice) {
        return choice.charAt(0).toUpperCase() + choice.slice(1);
      }

      function getComputerChoice() {
        return choices[Math.floor(Math.random() * choices.length)];
      }

      function setScores() {
        playerScoreEl.textContent = playerScore;
        computerScoreEl.textContent = computerScore;
        tieScoreEl.textContent = tieScore;
      }

      function resetSelection() {
        choiceButtons.forEach((btn) => {
          btn.classList.remove("selected", "winner");
          btn.removeAttribute("aria-pressed");
        });
      }

      function showSparkleAt(target) {
        const rect = target.getBoundingClientRect();
        const parentRect = target.offsetParent.getBoundingClientRect();
        const x = rect.left - parentRect.left + rect.width / 2;
        const y = rect.top - parentRect.top + rect.height / 2;
        sparkleEl.style.left = `${x}px`;
        sparkleEl.style.top = `${y}px`;
        sparkleEl.classList.remove("animate");
        requestAnimationFrame(() => sparkleEl.classList.add("animate"));
      }

      function setResultText(result, player, computer) {
        if (result === "win") {
          resultTitle.textContent = "You win!";
          resultDetails.innerHTML = `You chose <mark>${formatChoice(player)}</mark> and the computer chose <mark>${formatChoice(computer)}</mark>.`;
        } else if (result === "lose") {
          resultTitle.textContent = "You lose";
          resultDetails.innerHTML = `You chose <mark>${formatChoice(player)}</mark> but the computer chose <mark>${formatChoice(computer)}</mark>.`;
        } else {
          resultTitle.textContent = "It's a tie";
          resultDetails.innerHTML = `Both you and the computer chose <mark>${formatChoice(player)}</mark>.`;
        }
      }

      function setResultAndAnimation(result, playerBtn, compBtn) {
        resetSelection();
        playerBtn.classList.add("selected");
        compBtn.classList.add("selected");

        if (result === "win") {
          playerBtn.classList.add("winner");
          showSparkleAt(playerBtn);
        } else if (result === "lose") {
          compBtn.classList.add("winner");
          showSparkleAt(compBtn);
        }

        setResultText(result, playerBtn.dataset.choice, compBtn.dataset.choice);
      }

      function evaluateRound(playerChoice) {
        const computerChoice = getComputerChoice();
        const playerBtn = choiceButtons.find(
          (btn) => btn.dataset.choice === playerChoice,
        );
        const compBtn = choiceButtons.find(
          (btn) => btn.dataset.choice === computerChoice,
        );

        const isWin = winMap[playerChoice] === computerChoice;
        const isTie = playerChoice === computerChoice;

        if (isTie) {
          tieScore += 1;
        } else if (isWin) {
          playerScore += 1;
        } else {
          computerScore += 1;
        }

        setScores();
        setResultAndAnimation(
          isTie ? "tie" : isWin ? "win" : "lose",
          playerBtn,
          compBtn,
        );

        if (playerScore === 5 || computerScore === 5) {
          const hasWon = playerScore === 5;
          setTimeout(() => {
            const message = hasWon
              ? "You reached 5 first! Great job!"
              : "The computer reached 5 first — try again!";
            resultTitle.textContent = hasWon ? "Match Over" : "Match Over";
            resultDetails.textContent = message;
          }, 500);
        }
      }

      function handleChoiceClick(event) {
        if (isAnimating) return;
        const btn = event.currentTarget;
        const choice = btn.dataset.choice;
        if (!choice) return;

        isAnimating = true;
        btn.classList.add("selected");
        btn.setAttribute("aria-pressed", "true");

        // Add a quick press animation
        btn.animate(
          [
            { transform: "scale(1)" },
            { transform: "scale(1.07)" },
            { transform: "scale(1)" },
          ],
          { duration: 300, easing: "ease-out" },
        );

        setTimeout(() => {
          evaluateRound(choice);
          isAnimating = false;
        }, 300);
      }

      function resetGame() {
        playerScore = 0;
        computerScore = 0;
        tieScore = 0;
        setScores();
        resetSelection();
        resultTitle.textContent = "Make your move";
        resultDetails.textContent =
          "Pick rock, paper, or scissors to start the battle.";
      }

      choiceButtons.forEach((btn) => {
        btn.addEventListener("click", handleChoiceClick);
        btn.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            btn.click();
          }
        });
      });

      resetBtn.addEventListener("click", resetGame);

      rulesBtn.addEventListener("click", () => {
        const rules =
          "Rock beats scissors, scissors beats paper, and paper beats rock. \n" +
          "Click a tile to play, first to 5 points wins. Good luck!";
        alert(rules);
      });

      // Start with a quick entry animation on load
      window.addEventListener("load", () => {
        document.body.animate(
          [
            { opacity: 0, transform: "translateY(18px)" },
            { opacity: 1, transform: "translateY(0)" },
          ],
          { duration: 500, easing: "ease-out" },
        );
      });
    </script>
  </body>
</html>
