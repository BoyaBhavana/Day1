<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Abstract Minimal Clock</title>
    <style>
      :root {
        --size: 340px;
        --bg: #0b1220;
        --hour-color: #6ad2ff;
        --minute-color: #43f3a5;
        --second-color: #ff6b94;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 30% 20%, #1e3a60 0%, #050914 80%);
        font-family: system-ui, sans-serif;
        color: #fff;
      }

      .clock {
        position: relative;
        width: var(--size);
        height: var(--size);
        border-radius: 50%;
        background: radial-gradient(
          circle at center,
          rgba(255, 255, 255, 0.05),
          rgba(0, 0, 0, 0.6) 65%
        );
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.55);
        overflow: hidden;
      }

      .clock::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: radial-gradient(
          circle at center,
          rgba(255, 255, 255, 0.05),
          transparent 55%
        );
        pointer-events: none;
      }

      .ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        pointer-events: none;
      }

      .ring--hours {
        padding: 18px;
      }
      .ring--minutes {
        inset: 18%;
        border-radius: 50%;
      }
      .ring--seconds {
        inset: 32%;
        border-radius: 50%;
      }

      .tick {
        position: absolute;
        top: 10px;
        left: 50%;
        width: 4px;
        height: 14px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.12);
        transform-origin: 50% 100%;
      }

      .tick.hour.active {
        background: var(--hour-color);
        box-shadow: 0 0 12px rgba(106, 210, 255, 0.6);
      }
      .tick.minute.active {
        background: var(--minute-color);
        box-shadow: 0 0 12px rgba(67, 243, 165, 0.6);
      }
      .tick.second.active {
        background: var(--second-color);
        box-shadow: 0 0 16px rgba(255, 107, 148, 0.6);
      }

      .center {
        position: absolute;
        inset: 42%;
        border-radius: 50%;
        background: radial-gradient(
          circle at center,
          rgba(255, 255, 255, 0.18),
          rgba(0, 0, 0, 0.7)
        );
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.65);
        pointer-events: none;
      }

      .hint {
        position: absolute;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        opacity: 0.55;
        letter-spacing: 0.15em;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div class="clock" aria-label="Abstract minimal clock">
      <div class="ring ring--hours" aria-hidden="true"></div>
      <div class="ring ring--minutes" aria-hidden="true"></div>
      <div class="ring ring--seconds" aria-hidden="true"></div>
      <div class="center" aria-hidden="true"></div>
      <div class="hint">outer = hours | middle = minutes | inner = seconds</div>
    </div>

    <script>
      const createTicks = (container, count, cls) => {
        for (let i = 0; i < count; i += 1) {
          const tick = document.createElement("div");
          tick.className = `tick ${cls}`;
          tick.style.transform = `rotate(${(360 / count) * i}deg)`;
          container.appendChild(tick);
        }
      };

      const hoursRing = document.querySelector(".ring--hours");
      const minutesRing = document.querySelector(".ring--minutes");
      const secondsRing = document.querySelector(".ring--seconds");

      createTicks(hoursRing, 12, "hour");
      createTicks(minutesRing, 60, "minute");
      createTicks(secondsRing, 60, "second");

      const update = () => {
        const now = new Date();
        const hour = now.getHours() % 12;
        const minute = now.getMinutes();
        const second = now.getSeconds();

        hoursRing.querySelectorAll(".tick.hour").forEach((t, i) => {
          t.classList.toggle("active", i === hour);
        });
        minutesRing.querySelectorAll(".tick.minute").forEach((t, i) => {
          t.classList.toggle("active", i === minute);
        });
        secondsRing.querySelectorAll(".tick.second").forEach((t, i) => {
          t.classList.toggle("active", i === second);
        });
      };

      update();
      setInterval(update, 250);
    </script>
  </body>
</html>
